name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Fizla.sln

      - name: Build
        run: dotnet build Fizla.sln --no-restore -c Release

      - name: Test
        run: dotnet test Fizla.sln --no-build -c Release --verbosity normal
